name: Deploy

# Trigger: push tag v* -> prod (/opt/xblpp/clients/prod)
#          push branch staging -> staging (/opt/xblpp/clients/staging)
#          manual ("Run workflow" GitHub UI) -> pilih target, langkau guard
# Rujuk docs/prd/xBLPP-Struktur-Repo-Schema.md Seksyen 5 dan
# docs/runbook/deploy.md untuk bootstrap VPS yang diperlukan sebelum run pertama.
on:
  push:
    branches: [staging]
    tags: ["v*"]
  # Manual run ("Run workflow" di GitHub) — untuk test SSH/secrets tanpa
  # tunggu lepas guard 8am-6pm (klik manual = kelulusan manusia eksplisit,
  # jadi guard dilangkau untuk laluan ni sahaja; auto-trigger push tetap
  # kena guard macam biasa, rujuk step "Guard" bawah).
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy ke mana"
        required: true
        default: staging
        type: choice
        options: [staging, prod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Tentukan environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.target }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TARGET="prod"
          else
            TARGET="staging"
          fi

          if [ "$TARGET" = "prod" ]; then
            echo "name=prod" >> "$GITHUB_OUTPUT"
            echo "url=https://blpp.gerakops.com" >> "$GITHUB_OUTPUT"
          else
            echo "name=staging" >> "$GITHUB_OUTPUT"
            echo "url=https://staging-blpp.gerakops.com" >> "$GITHUB_OUTPUT"
          fi
          echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: "Guard: staging dilarang 8am-6pm hari bekerja"
        # workflow_dispatch = klik manual di GitHub UI = kelulusan manusia
        # eksplisit untuk run tu sahaja — guard ni wujud untuk elak auto-deploy
        # push tak sengaja waktu bekerja, bukan untuk sekat test manual.
        if: steps.target.outputs.name == 'staging' && github.event_name != 'workflow_dispatch'
        run: |
          DOW=$(TZ='Asia/Kuala_Lumpur' date +%u)
          HOUR=$(TZ='Asia/Kuala_Lumpur' date +%H)
          NOW=$(TZ='Asia/Kuala_Lumpur' date)
          if [ "$DOW" -le 5 ] && [ "$HOUR" -ge 8 ] && [ "$HOUR" -lt 18 ]; then
            echo "::error::Deploy staging dilarang 8am-6pm hari bekerja (semasa: $NOW, Asia/Kuala_Lumpur)"
            exit 1
          fi
          echo "Guard lulus — semasa: $NOW (Asia/Kuala_Lumpur)"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Percaya host key VPS
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy (SSH -> forced command ci-deploy.sh di VPS)
        # SSH_PRIVATE_KEY discope dengan `command=` forced command dalam
        # authorized_keys VPS (rujuk scripts/ci-deploy.sh + docs/runbook/deploy.md)
        # — sshd abaikan command client, cuma "target ref" ni didedahkan via
        # $SSH_ORIGINAL_COMMAND untuk wrapper parse. TIADA arbitrary shell
        # dihantar lagi, walaupun key ni bocor blast radius terhad kepada
        # deploy xBLPP staging/prod daripada repo GitHub tetap sahaja.
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "${{ steps.target.outputs.name }} ${{ steps.target.outputs.ref }}"

      - name: Smoke test
        run: |
          URL="${{ steps.target.outputs.url }}/api/health"
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Smoke test lulus: $URL -> 200"
              exit 0
            fi
            echo "Cubaan $i/10: $URL -> $CODE, tunggu 5s..."
            sleep 5
          done
          echo "::error::Smoke test gagal — $URL tidak return 200 selepas 10 cubaan. Rujuk docs/runbook/deploy.md untuk rollback."
          exit 1
